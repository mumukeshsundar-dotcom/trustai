<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustAI — MSME Business Ecosystem</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- ── AUTH SCREEN ──────────────────────────────────────────────────────── -->
<div id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🤝</div>
      <div>
        <h1>TrustAI</h1>
        <span>MSME Business Ecosystem</span>
      </div>
    </div>

    <h2>Welcome back</h2>
    <p class="sub">Sign in to manage your business operations</p>

    <div class="demo-pills">
      <div class="demo-pill" onclick="fillDemo('owner@demo.com','demo123')">🏢 Business Owner</div>
      <div class="demo-pill" onclick="fillDemo('supplier@demo.com','demo123')">🏭 Supplier</div>
      <div class="demo-pill" onclick="fillDemo('logistics@demo.com','demo123')">🚚 Logistics</div>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@business.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Sign In →</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--text3)">
      Click a demo pill above to auto-fill credentials<br>Password for all: <code style="color:var(--accent)">demo123</code>
    </p>
  </div>
</div>

<!-- ── MAIN APP ──────────────────────────────────────────────────────────── -->
<div id="app" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-row">
        <div class="logo-box">🤝</div>
        <div>
          <h1>TrustAI</h1>
          <div class="tagline">MSME Ecosystem</div>
        </div>
      </div>
    </div>

    <div class="user-pill">
      <div class="user-avatar" id="sidebar-avatar">A</div>
      <div>
        <div class="uname" id="sidebar-user-name">Loading...</div>
        <div class="urole" id="sidebar-user-role">role</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Built by JS -->
    </nav>

    <div class="sidebar-footer">
      <button class="btn btn-ghost" style="width:100%;justify-content:flex-start;font-size:13px" onclick="logout()">
        ↩ Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <span class="badge badge-verified" id="topbar-verified" style="display:none">✓ Verified</span>
        <span class="badge" id="topbar-role-badge">Owner</span>
        
      </div>
    </header>

    <main class="page-content">
      <div id="page-container">
        <div class="loading-overlay"><span class="spinner"></span> Loading...</div>
      </div>
    </main>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script src="js/app.js"></script>
</body>
</html>
